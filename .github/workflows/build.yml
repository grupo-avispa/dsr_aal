name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  behaviortree_cpp:
    runs-on: ubuntu-latest
    container: grupoavispa/behaviortree_cpp:4.6
    steps:
      - name: Get BehaviorTree.CPP
        run: |
          mkdir -p artifacts/include
          mkdir -p artifacts/lib
          cp -r /usr/local/include/ artifacts
          cp -r /usr/local/lib/ artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v8
        with:
          name: behaviortree_cpp
          path: artifacts/
          retention-days: 1

  oatpp:
    runs-on: ubuntu-latest
    container: grupoavispa/oatpp:1.3.0-jammy
    steps:
      - name: Get Oatpp
        run: |
          mkdir -p artifacts/include
          mkdir -p artifacts/lib
          cp -r /usr/local/include/ artifacts
          cp -r /usr/local/lib/ artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v8
        with:
          name: oatpp
          path: artifacts/
          retention-days: 1

  build:
    needs: [behaviortree_cpp, oatpp]
    runs-on: ubuntu-latest
    container: grupoavispa/cortex:development-latest
    steps:
      - name: Install git
        run: |
          DEBIAN_FRONTEND=noninteractive apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y git

      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Download BehaviorTree.CPP artifacts
        uses: actions/download-artifact@v8
        with:
          name: behaviortree_cpp
          path: artifacts

      - name: Download Oatpp artifacts
        uses: actions/download-artifact@v8
        with:
          name: oatpp
          path: artifacts

      - name: Cache build directory
        uses: actions/cache@v6
        with:
          path: build/
          key: cache-${{ github.ref_name }}
          restore-keys: |
            cache-${{ github.event.repository.default_branch }}

      - name: Install dependencies
        run: |
          DEBIAN_FRONTEND=noninteractive apt-get update
          ./install_dependencies.sh
          ln -sf /usr/include/eigen3/Eigen /usr/include/Eigen

      - name: Copy dependencies
        run: cp -r artifacts/* /usr/local/

      - name: Build project
        run: |
          mkdir -p build && cd build
          cmake ..
          make -j$(nproc)
          make install
